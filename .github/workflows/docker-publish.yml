name: Build and publish

on:
  push:
    branches: [main]
    paths:
      - app/**
      - tests/**
      - Dockerfile
      - Dockerfile.dev
      - docker-compose*.yml
      - requirements*.txt
      - .github/workflows/docker-publish.yml
  release:
    types: [published]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create test data
        run: |
          mkdir -p /tmp/nasdirstat-testdata/movies /tmp/nasdirstat-testdata/music
          dd if=/dev/zero bs=1M count=5 of=/tmp/nasdirstat-testdata/movies/film.mkv 2>/dev/null
          dd if=/dev/zero bs=1M count=2 of=/tmp/nasdirstat-testdata/music/track.mp3 2>/dev/null
      - name: Run tests via docker compose
        env:
          DEV_DATA_PATH: /tmp/nasdirstat-testdata
        run: docker compose -f docker-compose.dev.yml up --abort-on-container-exit --exit-code-from tests

  build-and-push:
    name: Build and push image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
