<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nasdirstat</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='10' y='55' width='25' height='35' fill='%23ffb300'/%3E%3Crect x='40' y='35' width='25' height='55' fill='%23ffb300' opacity='.7'/%3E%3Crect x='70' y='15' width='20' height='75' fill='%23ffb300' opacity='.5'/%3E%3C/svg%3E">
<script>
/* Apply saved theme/palette/scanlines before CSS renders to prevent flash */
(function(){
  function h2r(h){var m=/^#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i.exec(h);return m?[parseInt(m[1],16),parseInt(m[2],16),parseInt(m[3],16)]:null;}
  function r2h(c){return'#'+c.map(function(v){return Math.round(Math.max(0,Math.min(255,v))).toString(16).padStart(2,'0');}).join('');}
  function bl(a,b,t){return a.map(function(v,i){return v*(1-t)+b[i]*t;});}
  var t=localStorage.getItem('nasdirstat_theme')||'dark';
  document.documentElement.setAttribute('data-theme',t);
  if(localStorage.getItem('nasdirstat_scanlines')==='off')
    document.documentElement.setAttribute('data-scanlines','off');
  try{
    var p=JSON.parse(localStorage.getItem('nasdirstat_palette_'+t)||'null');
    if(p){
      var bg=h2r(p.bg),tx=h2r(p.text),ac=h2r(p.accent);
      if(bg&&tx&&ac){
        var lum=bg[0]*.299+bg[1]*.587+bg[2]*.114,dk=lum<128,st=dk?[255,255,255]:[0,0,0],sm=dk?.04:.06;
        var vars=[
          '--bg:'+r2h(bg),'--bg2:'+r2h(bl(bg,st,sm)),'--bg3:'+r2h(bl(bg,st,sm*2)),
          '--bg4:'+r2h(bl(bg,st,sm*3)),'--border:'+r2h(bl(bg,st,sm*4)),'--border-hi:'+r2h(bl(bg,st,sm*6)),
          '--accent:'+r2h(ac),'--accent-dim:'+r2h(bl(ac,dk?[0,0,0]:[255,255,255],.25)),
          '--accent-glow:rgba('+ac.join(',')+',0.07)','--accent-glow2:rgba('+ac.join(',')+',0.12)',
          '--text:'+r2h(tx),'--text-dim:'+r2h(bl(bg,tx,.70)),'--text-muted:'+r2h(bl(bg,tx,.50)),
          '--code-bg:'+r2h(bl(bg,dk?[0,0,0]:[255,255,255],.03)),'--code-text:'+r2h(bl(bg,tx,.65)),
          '--video-bg:#000','--green:'+(dk?'#00e676':'#1a7a40'),'--red:'+(dk?'#ff4444':'#cc2222'),'--blue:'+(dk?'#40c4ff':'#1a5fcc'),
        ];
        document.head.insertAdjacentHTML('beforeend','<style id="custom-palette">:root{'+vars.join(';')+'}</style>');
      }
    }
  }catch(e){}
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ── Variables ── */
  :root {
    --bg:           #0a0a0a;
    --bg2:          #111111;
    --bg3:          #181818;
    --bg4:          #1e1e1e;
    --border:       #252525;
    --border-hi:    #333333;
    --accent:       #ffb300;
    --accent-dim:   #7a5500;
    --accent-glow:  rgba(255,179,0,0.07);
    --accent-glow2: rgba(255,179,0,0.12);
    --green:        #00e676;
    --red:          #ff4444;
    --blue:         #40c4ff;
    --text:         #d8d8d8;
    --text-dim:     #b8b8b8;
    --text-muted:   #888888;
    --code-bg:      #060606;
    --code-text:    #c0c0c0;
    --video-bg:     #000000;
    --mono:         'IBM Plex Mono', monospace;
    --sans:         'IBM Plex Sans', sans-serif;
    --radius:       0;

    --amber:        var(--accent);
    --amber-dim:    var(--accent-dim);
    --amber-glow:   var(--accent-glow);
    --amber-glow2:  var(--accent-glow2);
  }

  /* ── Light theme ── */
  [data-theme="light"] {
    --bg:           #f5f5f0;
    --bg2:          #eaeae4;
    --bg3:          #dededa;
    --bg4:          #d2d2cc;
    --border:       #c8c8c2;
    --border-hi:    #aaaaaa;
    --accent:       #b06000;
    --accent-dim:   #7a4000;
    --accent-glow:  rgba(176,96,0,0.08);
    --accent-glow2: rgba(176,96,0,0.15);
    --green:        #1a7a40;
    --red:          #cc2222;
    --blue:         #1a5fcc;
    --text:         #1a1a18;
    --text-dim:     #484844;
    --text-muted:   #909088;
    --code-bg:      #eeeee8;
    --code-text:    #2a2a28;
    --video-bg:     #1a1a1a;
  }

  /* ── Purple theme ── */
  [data-theme="purple"] {
    --bg:           #0d0a1a;
    --bg2:          #130f26;
    --bg3:          #1b1635;
    --bg4:          #231d44;
    --border:       #2e2752;
    --border-hi:    #3f366e;
    --accent:       #b388ff;
    --accent-dim:   #7c4dff;
    --accent-glow:  rgba(179,136,255,0.08);
    --accent-glow2: rgba(179,136,255,0.14);
    --green:        #69ff47;
    --red:          #ff5252;
    --blue:         #82b1ff;
    --text:         #e8e0ff;
    --text-dim:     #c8b8f0;
    --text-muted:   #9880c8;
    --code-bg:      #0a0818;
    --code-text:    #d0c8f8;
    --video-bg:     #000000;
  }

  /* ── Slate theme ── */
  [data-theme="slate"] {
    --bg:           #0f1117;
    --bg2:          #161b27;
    --bg3:          #1d2235;
    --bg4:          #242940;
    --border:       #2e3650;
    --border-hi:    #3d4868;
    --accent:       #38bdf8;
    --accent-dim:   #0284c7;
    --accent-glow:  rgba(56,189,248,0.07);
    --accent-glow2: rgba(56,189,248,0.12);
    --green:        #4ade80;
    --red:          #f87171;
    --blue:         #a78bfa;
    --text:         #c8d3e8;
    --text-dim:     #b0bcd8;
    --text-muted:   #8090b0;
    --code-bg:      #090d16;
    --code-text:    #b8c4d8;
    --video-bg:     #000000;
  }

  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  /* ── Base ── */
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 9998;
  }
  [data-theme="light"] body::after,
  [data-scanlines="off"] body::after { display: none; }

  /* ── Buttons ── */
  .btn {
    background: none;
    border: 1px solid var(--border-hi);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 14px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: border-color 0.12s, color 0.12s, background 0.12s;
    white-space: nowrap;
  }
  .btn:hover:not(:disabled) { border-color: var(--amber); color: var(--amber); }
  .btn.active               { border-color: var(--amber); color: var(--amber); background: var(--amber-glow); }
  .btn:disabled             { opacity: 0.3; cursor: not-allowed; }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg2);
    gap: 16px;
    flex-shrink: 0;
  }

  .logo { display: flex; align-items: baseline; gap: 10px; flex-shrink: 0; }
  .logo-mark {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--amber);
    text-shadow: 0 0 24px rgba(255,179,0,0.25);
  }
  .logo-mark::before { content: '> '; color: var(--text-dim); font-weight: 300; }
  .logo-sub {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .header-right { display: flex; align-items: center; gap: 16px; }

  /* Index status pill */
  .index-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 5px 11px;
    background: var(--bg);
    white-space: nowrap;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; transition: background 0.3s; }
  .dot.ok   { background: var(--green);  box-shadow: 0 0 7px var(--green); }
  .dot.err  { background: var(--red);    box-shadow: 0 0 7px var(--red); }
  .dot.busy { background: var(--amber);  box-shadow: 0 0 7px var(--amber); animation: pulse 1.2s ease infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.25; } }

  /* ── Settings panel ── */
  #settings-panel {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.22s ease, border-color 0.22s, box-shadow 0.22s;
    position: relative;
    z-index: 100;
    flex-shrink: 0;
  }
  #settings-panel.open {
    max-height: 500px;
    border-bottom-color: var(--border-hi);
    box-shadow: 0 8px 32px rgba(0,0,0,0.75);
  }
  .settings-inner {
    padding: 20px 28px;
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    align-items: flex-start;
  }
  .settings-section { display: flex; flex-direction: column; gap: 10px; }
  .settings-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* Interval picker */
  .interval-row { display: flex; gap: 4px; flex-wrap: wrap; }
  .ivl-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 11px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.1s;
  }
  .ivl-btn:hover   { border-color: var(--amber); color: var(--amber); }
  .ivl-btn.on      { border-color: var(--amber); color: var(--amber); background: var(--amber-glow); }

  /* Settings info grid */
  .settings-info { font-size: 12px; color: var(--text-dim); display: flex; flex-direction: column; gap: 5px; }
  .settings-info span { display: flex; gap: 10px; }
  .info-k { color: var(--text-muted); min-width: 90px; }
  .info-v { color: var(--text); }

  /* Rescan section */
  .rescan-col { display: flex; flex-direction: column; gap: 8px; }
  #rescan-btn  { padding: 8px 20px; font-size: 12px; }
  #rescan-msg  { font-size: 11px; color: var(--text-dim); min-height: 15px; letter-spacing: 0.3px; }

  /* Colour palette pickers */
  .palette-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .palette-swatch-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .palette-swatch-label {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .pal-swatch {
    -webkit-appearance: none;
    appearance: none;
    width: 32px;
    height: 22px;
    padding: 2px;
    border: 1px solid var(--border-hi);
    background: none;
    cursor: pointer;
  }
  .pal-swatch::-webkit-color-swatch-wrapper { padding: 0; }
  .pal-swatch::-webkit-color-swatch { border: none; }
  .pal-swatch::-moz-color-swatch { border: none; }
  .pal-swatch:hover { border-color: var(--accent); }

  /* Scanline toggle switch */
  .scan-toggle {
    position: relative;
    display: inline-block;
    width: 36px;
    height: 20px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .scan-toggle input { display: none; }
  .scan-slider {
    position: absolute;
    inset: 0;
    background: var(--border-hi);
    border-radius: 10px;
    transition: background 0.2s;
  }
  .scan-slider::before {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 16px; height: 16px;
    background: var(--bg4);
    border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }
  .scan-toggle input:checked + .scan-slider { background: var(--accent); }
  .scan-toggle input:checked + .scan-slider::before { transform: translateX(16px); background: var(--bg2); }

  .pal-extra-row {
    display: flex;
    align-items: flex-end;
    gap: 14px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .pal-reset-btn {
    height: 22px;
    padding: 0 8px;
    font-size: 9px;
    letter-spacing: 1px;
    align-self: flex-end;
  }

  /* ── Treemap view ── */
  #view {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
    position: relative;
  }

  /* Breadcrumb bar */
  #breadcrumb-bar {
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    padding: 7px 28px;
    display: flex;
    align-items: center;
    gap: 0;
    font-size: 12px;
    color: var(--text-muted);
    min-height: 34px;
    overflow: hidden;
  }
  .crumb-seg {
    color: var(--text-dim);
    cursor: pointer;
    padding: 1px 4px;
    letter-spacing: 0.3px;
    white-space: nowrap;
    transition: color 0.1s;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
  }
  .crumb-seg:hover { color: var(--amber); }
  .crumb-sep { color: var(--border-hi); padding: 0 2px; user-select: none; flex-shrink: 0; }
  .crumb-active { color: var(--amber); padding: 1px 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 240px; }
  .crumb-total { margin-left: auto; color: var(--text-muted); font-size: 11px; white-space: nowrap; padding-left: 16px; }

  /* Treemap container — SVG fills this */
  #treemap-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    min-height: 0;
  }
  #treemap-svg { display: block; width: 100%; height: 100%; }

  /* Empty / loading overlay */
  #state-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: var(--bg);
    z-index: 10;
    pointer-events: none;
  }
  #state-overlay.hidden { display: none; }
  #state-overlay.clickable { pointer-events: all; }
  .state-glyph  { font-size: 36px; font-family: var(--mono); color: var(--text-muted); user-select: none; }
  .state-title  { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); }
  .state-sub    { font-size: 11px; color: var(--text-muted); opacity: 0.7; }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border-hi);
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: spin 0.55s linear infinite;
    display: inline-block;
  }
  .spinner-lg {
    width: 28px; height: 28px;
    border: 3px solid var(--border-hi);
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Treemap cells ── */
  .tm-cell { cursor: pointer; transition: opacity 0.08s; }
  .tm-dir-label, .tm-file-label { pointer-events: none; font-family: 'IBM Plex Mono', monospace; }
  .tm-dir-bg .tm-cell { cursor: default; }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed;
    pointer-events: none;
    z-index: 500;
    background: var(--bg2);
    border: 1px solid var(--border-hi);
    padding: 10px 14px;
    max-width: 300px;
    font-family: var(--mono);
    font-size: 11.5px;
    line-height: 1.65;
    box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    transition: opacity 0.08s;
  }
  #tooltip.hidden { opacity: 0; pointer-events: none; }
  .tt-name { color: var(--amber); font-weight: 500; word-break: break-all; margin-bottom: 4px; font-size: 12px; }
  .tt-row  { display: flex; justify-content: space-between; gap: 16px; }
  .tt-k    { color: var(--text-muted); }
  .tt-v    { color: var(--text); }
  .tt-pct  { color: var(--accent); font-weight: 500; }
  .tt-hint { color: var(--text-muted); font-size: 10.5px; margin-top: 4px; letter-spacing: 0.3px; }

  /* ── Legend ── */
  #legend-bar {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    background: var(--bg2);
    padding: 5px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; white-space: nowrap; }
  .legend-dot  { width: 8px; height: 8px; flex-shrink: 0; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--bg3);
    border: 1px solid var(--border-hi);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.3px;
    padding: 10px 20px;
    z-index: 99999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s ease, transform 0.18s ease;
    white-space: nowrap;
    max-width: min(520px, 90vw);
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.toast-error { border-color: rgba(255,68,68,0.35); color: var(--red); }
  .toast.toast-info  { border-color: var(--amber-dim); color: var(--amber); }

  /* ── Footer ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 9px 28px;
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    gap: 20px;
    background: var(--bg2);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  kbd {
    background: var(--bg3);
    border: 1px solid var(--border-hi);
    padding: 1px 5px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
  }
</style>
</head>
<body>

<!-- ════════════════════════════════ Header ════════════════════════════════ -->
<header>
  <div class="logo">
    <span class="logo-mark">nasdirstat</span>
    <span class="logo-sub">disk usage</span>
  </div>
  <div class="header-right">
    <div class="index-status">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">checking…</span>
    </div>
    <button class="btn" id="settings-toggle">⚙ settings</button>
    <button class="btn" id="logout-btn" style="display:none">⏻ logout</button>
  </div>
</header>

<!-- ══════════════════════════ Settings panel ══════════════════════════════ -->
<div id="settings-panel">
  <div class="settings-inner">

    <div class="settings-section">
      <div class="settings-label">Re-scan interval</div>
      <div class="interval-row">
        <button class="ivl-btn" data-hours="0">Manual</button>
        <button class="ivl-btn" data-hours="1">1h</button>
        <button class="ivl-btn" data-hours="6">6h</button>
        <button class="ivl-btn" data-hours="12">12h</button>
        <button class="ivl-btn" data-hours="24">24h</button>
        <button class="ivl-btn" data-hours="48">48h</button>
        <button class="ivl-btn" data-hours="168">Weekly</button>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-label">Scan info</div>
      <div class="settings-info">
        <span><span class="info-k">Last scanned</span><span class="info-v" id="info-last">—</span></span>
        <span><span class="info-k">Duration</span>    <span class="info-v" id="info-duration">—</span></span>
        <span><span class="info-k">Data root</span>   <span class="info-v" id="info-dataroot">—</span></span>
        <span><span class="info-k">Next run</span>    <span class="info-v" id="info-next">—</span></span>
      </div>
    </div>

    <div class="settings-section rescan-col">
      <div class="settings-label">Manual re-scan</div>
      <button class="btn" id="rescan-btn">⟳ Rescan now</button>
      <div id="rescan-msg"></div>
    </div>

    <div class="settings-section">

<!-- ═══════════════════════════════ Script ═════════════════════════════════ -->
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
'use strict';

// ── DOM refs ──────────────────────────────────────────────────────────────────
const statusDot      = document.getElementById('status-dot');
const statusText     = document.getElementById('status-text');
const settingsToggle = document.getElementById('settings-toggle');
const settingsPanel  = document.getElementById('settings-panel');
const logoutBtn      = document.getElementById('logout-btn');
const rescanBtn      = document.getElementById('rescan-btn');
const rescanMsg      = document.getElementById('rescan-msg');
const infoLast       = document.getElementById('info-last');
const infoDuration   = document.getElementById('info-duration');
const infoDataroot   = document.getElementById('info-dataroot');
const infoNext       = document.getElementById('info-next');

// ── State ─────────────────────────────────────────────────────────────────────
let csrfToken            = '';
let currentIntervalHours = 24;
let dataRoot             = '/data';
let currentPath          = null;
let pathStack            = [];
let currentData          = null;
let _toastTimer          = null;
let resizeTimer          = null;

// ── Utilities ─────────────────────────────────────────────────────────────────
function fmt(bytes) {
  if (bytes === 0) return '0 B';
  const u = ['B','KB','MB','GB','TB','PB'];
  const i = Math.min(Math.floor(Math.log2(Math.max(1,bytes)) / 10), u.length - 1);
  const v = bytes / (1 << (i * 10));
  return (i === 0 ? v.toFixed(0) : v.toFixed(v < 10 ? 2 : 1)) + ' ' + u[i];
}

function fmtDuration(s) {
  if (!s) return '—';
  return s < 60 ? `${s}s` : `${Math.floor(s/60)}m ${s%60}s`;
}

function fmtNext(lastTs, hours) {
  if (!hours) return 'manual only';
  if (!lastTs) return 'next scheduler tick';
  const diff = lastTs * 1000 + hours * 3_600_000 - Date.now();
  if (diff <= 0) return 'soon';
  const h = Math.floor(diff / 3_600_000);
  const m = Math.floor((diff % 3_600_000) / 60_000);
  return h > 0 ? `in ${h}h ${m}m` : `in ${m}m`;
}

function fmtAgo(ts) {
  if (!ts) return 'never';
  const s = Math.floor(Date.now() / 1000 - ts);
  if (s < 60)       return `${s}s ago`;
  if (s < 3600)     return `${Math.floor(s/60)}m ago`;
  if (s < 86400)    return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
}

function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function postWithCsrf(url, body = null) {
  const headers = { 'X-CSRF-Token': csrfToken };
  if (body !== null) headers['Content-Type'] = 'application/json';
  return fetch(url, {
    method: 'POST',
    headers,
    body: body !== null ? JSON.stringify(body) : undefined,
  });
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, type = 'info') {
  let toast = document.querySelector('.toast');
  if (!toast) { toast = document.createElement('div'); document.body.appendChild(toast); }
  clearTimeout(_toastTimer);
  toast.className = `toast toast-${type}`;
  toast.textContent = msg;
  toast.getBoundingClientRect();
  toast.classList.add('show');
  _toastTimer = setTimeout(() => toast.classList.remove('show'), 4000);
}

// ── State overlay ─────────────────────────────────────────────────────────────
function showOverlay(glyph, title, sub = '', spinner = false, showBtn = false) {
  const el = document.getElementById('state-overlay');
  el.classList.remove('hidden', 'clickable');
  if (showBtn) el.classList.add('clickable');
  document.getElementById('overlay-spinner').style.display = spinner ? '' : 'none';
  document.getElementById('overlay-glyph').style.display = spinner ? 'none' : '';
  document.getElementById('overlay-glyph').textContent = glyph;
  document.getElementById('overlay-title').textContent = title;
  document.getElementById('overlay-sub').textContent = sub;
  document.getElementById('overlay-btn').style.display = showBtn ? '' : 'none';
}
function hideOverlay() { document.getElementById('state-overlay').classList.add('hidden'); }

// ── File-type colour map ───────────────────────────────────────────────────────
const EXT_CAT = {
  mkv:'video',mp4:'video',avi:'video',mov:'video',m4v:'video',wmv:'video',
  flv:'video',webm:'video',ts:'video',m2ts:'video',
  mp3:'audio',flac:'audio',m4a:'audio',ogg:'audio',wav:'audio',aac:'audio',opus:'audio',wma:'audio',
  jpg:'image',jpeg:'image',png:'image',gif:'image',webp:'image',
  tiff:'image',bmp:'image',raw:'image',cr2:'image',nef:'image',heic:'image',
  pdf:'doc',doc:'doc',docx:'doc',xls:'doc',xlsx:'doc',txt:'doc',epub:'doc',mobi:'doc',
  zip:'archive',tar:'archive',gz:'archive',bz2:'archive',xz:'archive',rar:'archive','7z':'archive',
  iso:'iso',img:'iso',dmg:'iso',nrg:'iso',
};
const CAT_COLOR = {
  video:   '#3b82f6',
  audio:   '#10b981',
  image:   '#f59e0b',
  doc:     '#8b5cf6',
  archive: '#ef4444',
  iso:     '#f97316',
  other:   '#4b5563',
};
const LEGEND_ORDER = ['video','audio','image','doc','archive','iso','other'];
const LEGEND_LABEL = {video:'Video',audio:'Audio',image:'Image',doc:'Document',archive:'Archive',iso:'Disk image',other:'Other'};

function extCat(name) {
  const dot = name.lastIndexOf('.');
  if (dot < 0) return 'other';
  return EXT_CAT[name.slice(dot + 1).toLowerCase()] || 'other';
}
function fileColor(name) { return CAT_COLOR[extCat(name)] || CAT_COLOR.other; }

// Dir palette — top-level dirs each get a hue; children inherit + lighten slightly
const DIR_PALETTE = [
  '#1e40af','#166534','#92400e','#6b21a8','#991b1b',
  '#155e75','#4b5563','#1e3a5f','#374151','#3b2217',
];
let _topColors = {};

function dirBg(d) {
  let node = d;
  while (node.parent && node.parent.depth > 0) node = node.parent;
  const base = _topColors[node.data.path] || '#1e293b';
  const c = d3.hsl(base);
  c.l = Math.min(0.25, c.l + d.depth * 0.02);
  return c.formatHex();
}

// ── Breadcrumb ────────────────────────────────────────────────────────────────
function updateBreadcrumb(path, totalSize) {
  const inner = document.getElementById('breadcrumb-inner');
  inner.innerHTML = '';

  const rootParts = dataRoot.split('/').filter(Boolean);
  const pathParts = path.split('/').filter(Boolean);

  const segments = [{ label: rootParts[rootParts.length - 1] || '/', path: dataRoot }];
  let cur = dataRoot;
  const extra = pathParts.slice(rootParts.length);
  for (const p of extra) {
    cur = cur.replace(/\/$/, '') + '/' + p;
    segments.push({ label: p, path: cur });
  }

  segments.forEach((seg, i) => {
    if (i > 0) {
      const sep = document.createElement('span');
      sep.className = 'crumb-sep';
      sep.textContent = ' / ';
      inner.appendChild(sep);
    }
    const el = document.createElement('span');
    if (i === segments.length - 1) {
      el.className = 'crumb-active';
      el.textContent = seg.label;
    } else {
      el.className = 'crumb-seg';
      el.textContent = seg.label;
      el.title = seg.path;
      el.addEventListener('click', () => navigateTo(seg.path));
    }
    inner.appendChild(el);
  });

  document.getElementById('crumb-total').textContent = totalSize ? fmt(totalSize) : '';
}

// ── Load & render ─────────────────────────────────────────────────────────────
async function loadAndRender(path, push = false) {
  if (push && currentPath && path !== currentPath) pathStack.push(currentPath);
  showOverlay('', 'loading…', '', true);
  try {
    const r = await fetch(`/api/data?path=${encodeURIComponent(path)}&depth=3`);
    if (r.status === 401) { location.href = '/api/login'; return; }
    if (!r.ok) {
      const e = await r.json().catch(() => ({ detail: r.statusText }));
      showOverlay('✗', 'load failed', e.detail || '', false, false);
      return;
    }
    currentData = await r.json();
    currentPath = path;
    drawTreemap(currentData);
    updateBreadcrumb(path, currentData.size);
    hideOverlay();
  } catch (e) {
    showOverlay('✗', 'network error', e.message, false);
  }
}

function navigateTo(path) {
  if (path === currentPath) return;
  loadAndRender(path, true);
}

function goUp() {
  if (pathStack.length) {
    const prev = pathStack.pop();
    currentPath = prev;
    loadAndRender(prev, false);
  }
}

// ── D3 treemap ────────────────────────────────────────────────────────────────
function drawTreemap(data) {
  const container = document.getElementById('treemap-container');
  const W = container.clientWidth;
  const H = container.clientHeight;
  if (W <= 0 || H <= 0) return;

  const svg = d3.select('#treemap-svg').attr('width', W).attr('height', H);
  svg.selectAll('*').remove();

  // Cushion lighting gradients — shared across all cells via objectBoundingBox
  const defs = svg.append('defs');
  // Primary: diagonal TL highlight → BR shadow (main cushion effect)
  defs.append('linearGradient')
    .attr('id', 'cell-light')
    .attr('x1', '0').attr('y1', '0').attr('x2', '1').attr('y2', '1')
    .call(g => {
      g.append('stop').attr('offset', '0%')   .attr('stop-color', '#fff').attr('stop-opacity', '0.30');
      g.append('stop').attr('offset', '40%')  .attr('stop-color', '#fff').attr('stop-opacity', '0.03');
      g.append('stop').attr('offset', '60%')  .attr('stop-color', '#000').attr('stop-opacity', '0.00');
      g.append('stop').attr('offset', '100%') .attr('stop-color', '#000').attr('stop-opacity', '0.24');
    });
  // Secondary: top-edge highlight strip (reinforces the "lit from above" read)
  defs.append('linearGradient')
    .attr('id', 'cell-top')
    .attr('x1', '0').attr('y1', '0').attr('x2', '0').attr('y2', '1')
    .call(g => {
      g.append('stop').attr('offset', '0%')  .attr('stop-color', '#fff').attr('stop-opacity', '0.18');
      g.append('stop').attr('offset', '25%') .attr('stop-color', '#fff').attr('stop-opacity', '0.00');
    });

  const root = d3.hierarchy(data)
    .sum(d => (d.children && d.children.length) ? 0 : d.size)
    .sort((a, b) => b.value - a.value);

  d3.treemap()
    .size([W, H])
    .paddingOuter(3)
    .paddingTop(20)
    .paddingInner(1)
    .tile(d3.treemapResquarify)
    .round(true)
    (root);

  // Assign top-level colours
  _topColors = {};
  if (root.children) {
    root.children.forEach((child, i) => {
      _topColors[child.data.path] = DIR_PALETTE[i % DIR_PALETTE.length];
    });
  }

  const totalSize = root.value || 1;
  const w = d => Math.max(0, d.x1 - d.x0);
  const h = d => Math.max(0, d.y1 - d.y0);

  const nodes = root.descendants().filter(d => d.depth > 0);

  const cell = svg.selectAll('g.tm-cell')
    .data(nodes, d => d.data.path)
    .join('g')
    .attr('class', 'tm-cell')
    .attr('transform', d => `translate(${d.x0},${d.y0})`);

  // Base colour rect
  cell.append('rect')
    .attr('width', w)
    .attr('height', h)
    .attr('fill', d => d.children ? dirBg(d) : fileColor(d.data.name))
    .attr('stroke', d => d.children ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.35)')
    .attr('stroke-width', d => d.children ? 1 : 0.5);

  // Cushion lighting — diagonal highlight+shadow overlay on leaf (file) cells
  cell.filter(d => !d.children)
    .append('rect')
    .attr('width', w)
    .attr('height', h)
    .attr('fill', 'url(#cell-light)')
    .attr('pointer-events', 'none');

  // Top-edge reinforcement on leaf cells (sharpens the "lit from above" read)
  cell.filter(d => !d.children)
    .append('rect')
    .attr('width', w)
    .attr('height', h)
    .attr('fill', 'url(#cell-top)')
    .attr('pointer-events', 'none');

  // Directory header label (sits in paddingTop area)
  cell.filter(d => d.children && w(d) > 28 && h(d) > 20)
    .append('text')
    .attr('class', 'tm-dir-label')
    .attr('x', 4)
    .attr('y', 3)
    .attr('font-size', 11)
    .attr('fill', 'rgba(255,255,255,0.55)')
    .attr('font-weight', '500')
    .text(d => {
      const label = d.data.name;
      const maxCh = Math.max(2, Math.floor(w(d) / 6.5) - 1);
      return label.length > maxCh ? label.slice(0, maxCh - 1) + '…' : label;
    });

  // File name label (centred)
  cell.filter(d => !d.children && w(d) > 36 && h(d) > 20)
    .append('text')
    .attr('class', 'tm-file-label')
    .attr('x', d => w(d) / 2)
    .attr('y', d => h(d) > 34 ? h(d) / 2 - 6 : h(d) / 2)
    .attr('text-anchor', 'middle')
    .attr('dominant-baseline', 'middle')
    .attr('font-size', 10)
    .attr('fill', 'rgba(255,255,255,0.75)')
    .text(d => {
      const label = d.data.name;
      const maxCh = Math.max(2, Math.floor(w(d) / 5.8) - 1);
      return label.length > maxCh ? label.slice(0, maxCh - 2) + '…' : label;
    });

  // File size label (below name)
  cell.filter(d => !d.children && w(d) > 50 && h(d) > 34)
    .append('text')
    .attr('class', 'tm-file-label')
    .attr('x', d => w(d) / 2)
    .attr('y', d => h(d) / 2 + 9)
    .attr('text-anchor', 'middle')
    .attr('dominant-baseline', 'middle')
    .attr('font-size', 9)
    .attr('fill', 'rgba(255,255,255,0.45)')
    .text(d => fmt(d.value));

  // Interactions
  cell
    .on('mouseenter', (event, d) => {
      showTip(event, d, totalSize);
      d3.select(event.currentTarget).attr('opacity', 0.78);
    })
    .on('mousemove', moveTooltip)
    .on('mouseleave', (event) => {
      hideTip();
      d3.select(event.currentTarget).attr('opacity', 1);
    })
    .on('click', (event, d) => {
      event.stopPropagation();
      if (d.children) navigateTo(d.data.path);
    });
}

// ── Tooltip ───────────────────────────────────────────────────────────────────
function showTip(event, d, totalSize) {
  const tt = document.getElementById('tooltip');
  const pct  = totalSize > 0 ? ((d.value / totalSize) * 100).toFixed(1) : '0';
  const pPct = d.parent?.value > 0 ? ((d.value / d.parent.value) * 100).toFixed(1) : '0';
  const isDir = !!d.children;
  tt.innerHTML = `
    <div class="tt-name">${escHtml(d.data.name)}</div>
    <div class="tt-row"><span class="tt-k">size</span><span class="tt-v">${fmt(d.value)}</span></div>
    <div class="tt-row"><span class="tt-k">of parent</span><span class="tt-pct">${pPct}%</span></div>
    <div class="tt-row"><span class="tt-k">of total</span><span class="tt-pct">${pct}%</span></div>
    <div class="tt-hint">${escHtml(d.data.path)}</div>
    ${isDir ? '<div class="tt-hint" style="color:var(--amber);margin-top:3px">↳ click to drill in</div>' : ''}
  `;
  tt.classList.remove('hidden');
  moveTooltip(event);
}
function moveTooltip(event) {
  const tt = document.getElementById('tooltip');
  const pad = 14;
  let x = event.clientX + pad, y = event.clientY + pad;
  if (x + 320 > window.innerWidth)  x = event.clientX - 320 - pad;
  if (y + 180 > window.innerHeight) y = event.clientY - tt.offsetHeight - pad;
  tt.style.left = x + 'px';
  tt.style.top  = y + 'px';
}
function hideTip() { document.getElementById('tooltip').classList.add('hidden'); }

// ── Legend ─────────────────────────────────────────────────────────────────────
function buildLegend() {
  const bar = document.getElementById('legend-bar');
  bar.innerHTML = '';
  LEGEND_ORDER.forEach(cat => {
    const item = document.createElement('span');
    item.className = 'legend-item';
    item.innerHTML = `<span class="legend-dot" style="background:${CAT_COLOR[cat]}"></span>${LEGEND_LABEL[cat]}`;
    bar.appendChild(item);
  });
}

// ── Theme & palette system (identical to nasearch) ────────────────────────────
const PRESET_PALETTES = {
  dark:   { bg: '#0a0a0a', text: '#d8d8d8', accent: '#ffb300' },
  light:  { bg: '#f5f5f0', text: '#1a1a18', accent: '#b06000' },
  purple: { bg: '#0d0a1a', text: '#e8e0ff', accent: '#b388ff' },
  slate:  { bg: '#0f1117', text: '#c8d3e8', accent: '#38bdf8' },
};

function _h2r(h){const m=/^#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i.exec(h);return m?[parseInt(m[1],16),parseInt(m[2],16),parseInt(m[3],16)]:null;}
function _r2h(c){return'#'+c.map(v=>Math.round(Math.max(0,Math.min(255,v))).toString(16).padStart(2,'0')).join('');}
function _bl(a,b,t){return a.map((v,i)=>v*(1-t)+b[i]*t);}

function buildPaletteVars(bgHex, textHex, accentHex) {
  const bg=_h2r(bgHex), tx=_h2r(textHex), ac=_h2r(accentHex);
  if (!bg||!tx||!ac) return '';
  const lum=bg[0]*.299+bg[1]*.587+bg[2]*.114, dk=lum<128;
  const st=dk?[255,255,255]:[0,0,0], sm=dk?.04:.06;
  return [
    `--bg:${_r2h(bg)}`,`--bg2:${_r2h(_bl(bg,st,sm))}`,`--bg3:${_r2h(_bl(bg,st,sm*2))}`,
    `--bg4:${_r2h(_bl(bg,st,sm*3))}`,`--border:${_r2h(_bl(bg,st,sm*4))}`,`--border-hi:${_r2h(_bl(bg,st,sm*6))}`,
    `--accent:${_r2h(ac)}`,`--accent-dim:${_r2h(_bl(ac,dk?[0,0,0]:[255,255,255],.25))}`,
    `--accent-glow:rgba(${ac.join(',')},0.07)`,`--accent-glow2:rgba(${ac.join(',')},0.12)`,
    `--text:${_r2h(tx)}`,`--text-dim:${_r2h(_bl(bg,tx,.70))}`,`--text-muted:${_r2h(_bl(bg,tx,.50))}`,
    `--code-bg:${_r2h(_bl(bg,dk?[0,0,0]:[255,255,255],.03))}`,`--code-text:${_r2h(_bl(bg,tx,.65))}`,
    `--video-bg:#000`,`--green:${dk?'#00e676':'#1a7a40'}`,`--red:${dk?'#ff4444':'#cc2222'}`,`--blue:${dk?'#40c4ff':'#1a5fcc'}`,
  ].join(';');
}

function syncPickers(bgHex, textHex, accentHex) {
  document.getElementById('pal-bg').value     = bgHex;
  document.getElementById('pal-text').value   = textHex;
  document.getElementById('pal-accent').value = accentHex;
}

function _paletteKey(theme) { return 'nasdirstat_palette_' + theme; }

function applyPaletteOverride(bgHex, textHex, accentHex) {
  const theme = localStorage.getItem('nasdirstat_theme') || 'dark';
  let el = document.getElementById('custom-palette');
  if (!el) { el = document.createElement('style'); el.id = 'custom-palette'; document.head.appendChild(el); }
  el.textContent = `:root{${buildPaletteVars(bgHex, textHex, accentHex)}}`;
  localStorage.setItem(_paletteKey(theme), JSON.stringify({ bg: bgHex, text: textHex, accent: accentHex }));
}

function setTheme(name) {
  const el = document.getElementById('custom-palette');
  if (el) el.remove();
  document.documentElement.setAttribute('data-theme', name);
  localStorage.setItem('nasdirstat_theme', name);
  document.querySelectorAll('.theme-btn').forEach(b =>
    b.classList.toggle('on', b.dataset.theme === name));
  const saved  = JSON.parse(localStorage.getItem(_paletteKey(name)) || 'null');
  const preset = PRESET_PALETTES[name];
  const pal    = saved || preset;
  if (pal) {
    syncPickers(pal.bg, pal.text, pal.accent);
    if (saved) applyPaletteOverride(saved.bg, saved.text, saved.accent);
  }
  // Redraw treemap to pick up new CSS colour vars
  if (currentData) setTimeout(() => drawTreemap(currentData), 50);
}

document.querySelectorAll('.theme-btn').forEach(btn =>
  btn.addEventListener('click', () => setTheme(btn.dataset.theme)));

['pal-bg','pal-text','pal-accent'].forEach(id =>
  document.getElementById(id).addEventListener('input', () =>
    applyPaletteOverride(
      document.getElementById('pal-bg').value,
      document.getElementById('pal-text').value,
      document.getElementById('pal-accent').value,
    )));

document.getElementById('pal-reset').addEventListener('click', () => {
  const theme = localStorage.getItem('nasdirstat_theme') || 'dark';
  localStorage.removeItem(_paletteKey(theme));
  const el = document.getElementById('custom-palette');
  if (el) el.remove();
  const preset = PRESET_PALETTES[theme];
  if (preset) syncPickers(preset.bg, preset.text, preset.accent);
  if (currentData) setTimeout(() => drawTreemap(currentData), 50);
});

// ── Scanlines toggle ───────────────────────────────────────────────────────────
const scanlineChk = document.getElementById('scanline-chk');

function setScanlines(on) {
  document.documentElement.setAttribute('data-scanlines', on ? 'on' : 'off');
  localStorage.setItem('nasdirstat_scanlines', on ? 'on' : 'off');
  scanlineChk.checked = on;
}
scanlineChk.addEventListener('change', () => setScanlines(scanlineChk.checked));

// ── Settings panel ────────────────────────────────────────────────────────────
settingsToggle.addEventListener('click', () => {
  const open = settingsPanel.classList.toggle('open');
  settingsToggle.classList.toggle('active', open);
  // Redraw after transition so treemap fills new height correctly
  if (!open && currentData) setTimeout(() => drawTreemap(currentData), 240);
});

// ── Interval buttons ───────────────────────────────────────────────────────────
function setIntervalActive(hours) {
  document.querySelectorAll('.ivl-btn[data-hours]').forEach(b =>
    b.classList.toggle('on', parseInt(b.dataset.hours, 10) === hours));
}

document.querySelectorAll('.ivl-btn[data-hours]').forEach(btn =>
  btn.addEventListener('click', async () => {
    const hours = parseInt(btn.dataset.hours, 10);
    await postWithCsrf('/api/settings', { interval_hours: hours });
    currentIntervalHours = hours;
    setIntervalActive(hours);
    await refreshStatus();
  }));

// ── Rescan ────────────────────────────────────────────────────────────────────
async function triggerRescan() {
  if (rescanBtn.disabled) return;
  rescanBtn.disabled = true;
  rescanMsg.textContent = 'Starting…';
  try {
    const res  = await postWithCsrf('/api/rescan');
    const data = await res.json();
    if (res.status === 409) {
      rescanMsg.textContent = 'Already running';
      rescanBtn.disabled = false;
      return;
    }
    rescanMsg.textContent = 'Running — this may take a while';
    pollScanner();
  } catch (e) {
    rescanMsg.textContent = '✗ ' + e.message;
    rescanBtn.disabled = false;
  }
}

function pollScanner() {
  const poll = setInterval(async () => {
    const s = await fetchStatus();
    if (!s) return;
    if (s.running) {
      rescanMsg.textContent = '⟳ ' + (s.progress || 'Scanning…');
    } else {
      clearInterval(poll);
      rescanBtn.disabled = false;
      if (s.error) {
        rescanMsg.textContent = '✗ ' + s.error;
      } else {
        rescanMsg.textContent = `✓ Done in ${fmtDuration(s.last_duration_seconds)}`;
        setTimeout(() => { rescanMsg.textContent = ''; }, 6000);
      }
      updateStatusUI(s);
      if (s.has_data) await loadAndRender(currentPath || dataRoot);
    }
  }, 2000);
}

rescanBtn.addEventListener('click', triggerRescan);
document.getElementById('overlay-btn').addEventListener('click', triggerRescan);

// ── Status ────────────────────────────────────────────────────────────────────
async function fetchStatus() {
  try { return await (await fetch('/api/status')).json(); } catch { return null; }
}

function updateStatusUI(s) {
  if (!s) {
    statusDot.className = 'dot err';
    statusText.textContent = 'unreachable';
    return;
  }
  if (s.csrf) csrfToken = s.csrf;
  dataRoot = s.data_root || '/data';
  if (!currentPath) currentPath = dataRoot;
  currentIntervalHours = s.interval_hours ?? 24;

  if (s.running) {
    statusDot.className = 'dot busy';
    statusText.textContent = 'scanning…';
  } else if (s.has_data) {
    statusDot.className = 'dot ok';
    const sizeEl = document.getElementById('crumb-total');
    statusText.textContent = 'ready' + (sizeEl?.textContent ? ' · ' + sizeEl.textContent : '');
  } else {
    statusDot.className = 'dot err';
    statusText.textContent = 'no data';
  }

  infoLast.textContent     = fmtAgo(s.last_scanned);
  infoDuration.textContent = fmtDuration(s.last_duration_seconds);
  infoDataroot.textContent = s.data_root || '—';
  infoNext.textContent     = fmtNext(s.last_scanned, s.interval_hours);
  setIntervalActive(s.interval_hours ?? 24);
  logoutBtn.style.display  = s.csrf ? '' : 'none';
}

async function refreshStatus() {
  updateStatusUI(await fetchStatus());
}

// ── Resize handler ────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { if (currentData) drawTreemap(currentData); }, 150);
});

// ── Keyboard navigation ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.key === 'Backspace' && !e.target.matches('input,textarea')) ||
      (e.key === 'ArrowLeft' && e.altKey)) {
    e.preventDefault();
    goUp();
  }
  if (e.key === 'Escape') {
    if (pathStack.length) {
      // pop all the way back to root
      pathStack = [];
      loadAndRender(dataRoot);
    }
    settingsPanel.classList.remove('open');
    settingsToggle.classList.remove('active');
  }
});

logoutBtn.addEventListener('click', async () => {
  await postWithCsrf('/api/logout');
  window.location.href = '/api/login';
});

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  buildLegend();

  // Apply saved theme/scanlines
  const savedScanlines = localStorage.getItem('nasdirstat_scanlines');
  setScanlines(savedScanlines !== 'off');
  setTheme(localStorage.getItem('nasdirstat_theme') || 'dark');

  showOverlay('', 'connecting…', '', true);

  const s = await fetchStatus();
  if (!s) {
    showOverlay('✗', 'cannot reach server', '');
    return;
  }

  updateStatusUI(s);

  if (s.running) {
    showOverlay('', 'scanning…', s.progress, true);
    pollScanner();
  } else if (!s.has_data) {
    showOverlay('▦', 'no scan data', 'run a scan to see your disk usage', false, true);
  } else {
    await loadAndRender(dataRoot);
  }

  // Idle status polling
  setInterval(refreshStatus, 10_000);
}

init();
</script>
</body>
</html>
